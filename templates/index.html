<!DOCTYPE html>
<html>
<head>
    <title>StudyBot 🎓</title>
</head>
<body>

<h2>StudyBot</h2>

<form method="post" action="/chat">
    <input type="text" name="user_id" placeholder="Enter User ID" required><br><br>
    <input type="text" name="question" placeholder="Ask question" required><br><br>
    <button type="submit">Send</button>
</form>

{% if response %}
    <h3>Answer:</h3>
    <p>{{ response }}</p>
{% endif %}

</body>
</html>
