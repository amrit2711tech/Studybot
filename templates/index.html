<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 400px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 20px;
        }

        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .message {
            margin: 8px 0;
        }

        .user {
            text-align: right;
            color: #4a47a3;
        }

        .bot {
            text-align: left;
            color: #333;
        }

        .input-area {
            display: flex;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #667eea;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="title">💬 AI Chat Assistant</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");

        let userText = input.value;
        if (!userText) return;

        // Show user message
        chatBox.innerHTML += `<div class="message user">You: ${userText}</div>`;

        // Clear input
        input.value = "";

        try {
            let response = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: userText })
            });

            let data = await response.json();

            // Show bot response
            chatBox.innerHTML += `<div class="message bot">Bot: ${data.reply}</div>`;

            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (error) {
            chatBox.innerHTML += `<div class="message bot">Error: Server not responding</div>`;
        }
    }
</script>

</body>
</html>
