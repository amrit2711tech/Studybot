<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudyBot 🎓</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px #000;
        }

        h2 {
            text-align: center;
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            background: #020617;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .user {
            color: #38bdf8;
            margin: 5px 0;
        }

        .bot {
            color: #22c55e;
            margin: 5px 0;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>🎓 StudyBot</h2>

    <input type="text" id="userId" placeholder="Enter User ID">
    
    <div class="chat-box" id="chatBox"></div>

    <input type="text" id="question" placeholder="Ask your question">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    const userId = document.getElementById("userId").value;
    const question = document.getElementById("question").value;
    const chatBox = document.getElementById("chatBox");

    if (!userId || !question) {
        alert("Please enter all fields");
        return;
    }

    // Show user message
    chatBox.innerHTML += `<div class="user"><b>You:</b> ${question}</div>`;

    document.getElementById("question").value = "";

    try {
        const response = await fetch("http://127.0.0.1:8000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user_id: userId,
                question: question
            })
        });

        const data = await response.json();

        chatBox.innerHTML += `<div class="bot"><b>Bot:</b> ${data.response}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        chatBox.innerHTML += `<div class="bot">❌ Error connecting to server</div>`;
    }
}
</script>

</body>
</html>
